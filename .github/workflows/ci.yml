name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Gradle build + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Grant gradlew exec
        run: chmod +x ./gradlew
        working-directory: BE
      - name: Build + test
        run: ./gradlew build --no-daemon
        working-directory: BE

  frontend:
    name: Frontend (build + lint)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [mobile-web, admin-web]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: npm install --no-audit --no-fund
        working-directory: FE/${{ matrix.app }}
      - name: Lint
        run: npm run lint
        working-directory: FE/${{ matrix.app }}
      - name: Build
        run: npm run build
        working-directory: FE/${{ matrix.app }}
