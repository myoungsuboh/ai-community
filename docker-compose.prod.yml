# ===========================================================================
# AI 커뮤니티 — 운영 배포용 compose (단일 호스트에 전체 스택 실행)
#   docker compose -f docker-compose.prod.yml up -d --build
#
# 필수: .env 에 JWT_SECRET(32바이트 이상) 등 시크릿 설정. 예시는 .env.example 참고.
# 프론트의 백엔드 URL 은 빌드 인자(PUBLIC_*_URL)로 주입 — 외부 도메인/호스트로 바꿔 빌드하세요.
# ===========================================================================

x-be-env: &be-env
  SPRING_PROFILES_ACTIVE: docker
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: ${POSTGRES_DB:-aicommunity}
  POSTGRES_USER: ${POSTGRES_USER:-aicommunity}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aicommunity_dev_pw}
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  JWT_SECRET: ${JWT_SECRET:-change-me-in-production-please-32bytes-minimum-secret}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:5174}
  AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}

x-be-common: &be-common
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aicommunity}
      POSTGRES_USER: ${POSTGRES_USER:-aicommunity}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aicommunity_dev_pw}
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aicommunity}"]
      interval: 5s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes: [redisdata:/data]
    restart: unless-stopped

  auth-service:
    <<: *be-common
    build: { context: ./BE, args: { SERVICE: auth-service } }
    environment: *be-env
    ports: ["8081:8080"]

  content-service:
    <<: *be-common
    build: { context: ./BE, args: { SERVICE: content-service } }
    environment: *be-env
    ports: ["8082:8080"]

  curation-service:
    <<: *be-common
    build: { context: ./BE, args: { SERVICE: curation-service } }
    environment: *be-env
    ports: ["8083:8080"]

  user-activity-service:
    <<: *be-common
    build: { context: ./BE, args: { SERVICE: user-activity-service } }
    environment: *be-env
    ports: ["8084:8080"]

  qna-service:
    <<: *be-common
    build: { context: ./BE, args: { SERVICE: qna-service } }
    environment: *be-env
    ports: ["8085:8080"]

  project-service:
    <<: *be-common
    build: { context: ./BE, args: { SERVICE: project-service } }
    environment: *be-env
    ports: ["8086:8080"]

  ranking-api-service:
    <<: *be-common
    build: { context: ./BE, args: { SERVICE: ranking-api-service } }
    environment: *be-env
    ports: ["8087:8080"]

  ranking-batch-worker:
    <<: *be-common
    build: { context: ./BE, args: { SERVICE: ranking-batch-worker } }
    environment: *be-env
    ports: ["8088:8080"]

  mobile-web:
    build:
      context: ./FE/mobile-web
      args:
        VITE_AUTH_URL: ${PUBLIC_AUTH_URL:-http://localhost:8081}
        VITE_CONTENT_URL: ${PUBLIC_CONTENT_URL:-http://localhost:8082}
        VITE_CURATION_URL: ${PUBLIC_CURATION_URL:-http://localhost:8083}
        VITE_ACTIVITY_URL: ${PUBLIC_ACTIVITY_URL:-http://localhost:8084}
        VITE_QNA_URL: ${PUBLIC_QNA_URL:-http://localhost:8085}
        VITE_PROJECT_URL: ${PUBLIC_PROJECT_URL:-http://localhost:8086}
        VITE_RANKING_URL: ${PUBLIC_RANKING_URL:-http://localhost:8087}
    ports: ["5173:80"]
    restart: unless-stopped

  admin-web:
    build:
      context: ./FE/admin-web
      args:
        VITE_AUTH_URL: ${PUBLIC_AUTH_URL:-http://localhost:8081}
        VITE_CONTENT_URL: ${PUBLIC_CONTENT_URL:-http://localhost:8082}
        VITE_CURATION_URL: ${PUBLIC_CURATION_URL:-http://localhost:8083}
        VITE_ACTIVITY_URL: ${PUBLIC_ACTIVITY_URL:-http://localhost:8084}
        VITE_QNA_URL: ${PUBLIC_QNA_URL:-http://localhost:8085}
        VITE_PROJECT_URL: ${PUBLIC_PROJECT_URL:-http://localhost:8086}
        VITE_RANKING_URL: ${PUBLIC_RANKING_URL:-http://localhost:8087}
    ports: ["5174:80"]
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
